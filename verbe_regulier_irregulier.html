<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Régulier ou Irrégulier ?</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f14;
    --surface: #16181f;
    --surface2: #1e2029;
    --border: #2a2d3a;
    --accent: #4ecb7f;
    --accent2: #2da866;
    --green: #4ecb7f;
    --red: #e05c5c;
    --blue: #5b8dee;
    --text: #e8eaf0;
    --muted: #6b6f82;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 64px;
    background-image: radial-gradient(ellipse at 20% 10%, rgba(78,203,127,0.07) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 80%, rgba(45,168,102,0.05) 0%, transparent 60%);
  }

  header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeDown 0.6s ease both;
  }

  header .tag {
    display: inline-block;
    background: rgba(78,203,127,0.12);
    color: var(--accent);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 999px;
    border: 1px solid rgba(78,203,127,0.25);
    margin-bottom: 14px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 46px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    margin-top: 10px;
    font-size: 15px;
    font-weight: 300;
  }

  /* --- CARD --- */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 36px 28px;
    width: 100%;
    max-width: 620px;
    animation: fadeUp 0.5s ease both;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 20px 20px 0 0;
  }

  /* Progress */
  .progress-bar-wrap {
    background: var(--border);
    border-radius: 999px;
    height: 6px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 500;
  }

  /* Question */
  .question-num {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 12px;
    font-family: 'Syne', sans-serif;
  }

  .verb-display {
    font-size: clamp(36px, 8vw, 58px);
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    text-align: center;
    letter-spacing: 0;
    margin: 28px 0 8px;
  }

  .verb-sub {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 32px;
  }

  /* Choix boutons */
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 20px;
  }

  .btn-choice {
    padding: 20px 16px;
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s, box-shadow 0.2s;
    letter-spacing: 0.3px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    position: relative;
    overflow: hidden;
  }

  .btn-choice .choice-icon {
    font-size: 24px;
    line-height: 1;
  }

  .btn-choice .choice-label {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .btn-choice .choice-hint {
    font-size: 10px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    letter-spacing: 0;
    text-transform: none;
  }

  .btn-choice:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(78,203,127,0.06);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(78,203,127,0.1);
  }

  .btn-choice:active:not(:disabled) { transform: translateY(0); }

  .btn-choice:disabled { cursor: not-allowed; }

  .btn-choice.selected-correct {
    border-color: var(--green);
    background: rgba(78,203,127,0.1);
    box-shadow: 0 0 0 3px rgba(78,203,127,0.15);
  }

  .btn-choice.selected-wrong {
    border-color: var(--red);
    background: rgba(224,92,92,0.1);
    box-shadow: 0 0 0 3px rgba(224,92,92,0.1);
  }

  .btn-choice.reveal-correct {
    border-color: var(--green);
    background: rgba(78,203,127,0.07);
  }

  /* Feedback */
  .feedback {
    border-radius: var(--radius);
    padding: 16px 20px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
    animation: fadeUp 0.3s ease both;
    margin-bottom: 4px;
  }

  .feedback.correct {
    background: rgba(78,203,127,0.1);
    border: 1px solid rgba(78,203,127,0.3);
    display: block;
  }

  .feedback.wrong {
    background: rgba(224,92,92,0.1);
    border: 1px solid rgba(224,92,92,0.3);
    display: block;
  }

  .feedback .fb-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }

  .feedback.correct .fb-title { color: var(--green); }
  .feedback.wrong .fb-title { color: var(--red); }

  .explanation {
    color: var(--muted);
    font-size: 13px;
    margin-top: 4px;
  }

  .explanation strong { color: var(--text); }
  .explanation em { color: var(--accent); font-style: normal; }

  .btn-next {
    display: none;
    width: 100%;
    margin-top: 16px;
    background: transparent;
    color: var(--accent);
    border: 1.5px solid rgba(245,200,66,0.4);
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 13px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    letter-spacing: 0.5px;
  }

  .btn-next:hover {
    background: rgba(78,203,127,0.08);
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  /* Score screen */
  .score-screen {
    text-align: center;
    padding: 10px 0 10px;
    animation: fadeUp 0.6s ease both;
  }

  .score-big {
    font-family: 'Syne', sans-serif;
    font-size: 80px;
    font-weight: 800;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 16px 0 8px;
  }

  .score-label {
    color: var(--muted);
    font-size: 15px;
    margin-bottom: 28px;
  }

  .score-emoji { font-size: 36px; margin-bottom: 4px; }

  .score-msg {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .score-detail {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 32px;
  }

  /* Review list */
  .review-list {
    text-align: left;
    margin-bottom: 28px;
    max-height: 340px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .review-list::-webkit-scrollbar { width: 5px; }
  .review-list::-webkit-scrollbar-track { background: var(--surface2); border-radius: 10px; }
  .review-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  .review-item {
    background: var(--surface2);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 8px;
    border-left: 3px solid transparent;
    font-size: 13px;
  }

  .review-item.ok { border-left-color: var(--green); }
  .review-item.ko { border-left-color: var(--red); }

  .review-verb {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 3px;
  }

  .review-answer { color: var(--muted); font-size: 12px; }
  .review-correct { color: var(--green); font-size: 12px; margin-top: 2px; }
  .review-base { color: var(--accent); font-size: 11px; margin-top: 2px; }

  .btn-restart {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #0e0f14;
    border: none;
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 15px 36px;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    letter-spacing: 0.5px;
  }

  .btn-restart:hover { transform: translateY(-2px); opacity: 0.9; }

  /* Badge score */
  .score-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(245,200,66,0.1);
    border: 1px solid rgba(245,200,66,0.25);
    border-radius: 999px;
    padding: 6px 16px;
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 12px;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .shake {
    animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
  }

  @keyframes shake {
    10%, 90% { transform: translateX(-2px); }
    20%, 80% { transform: translateX(4px); }
    30%, 50%, 70% { transform: translateX(-5px); }
    40%, 60% { transform: translateX(5px); }
  }

  @media (max-width: 420px) {
    .card { padding: 28px 20px 24px; }
    .choices { gap: 10px; }
    .btn-choice { padding: 16px 10px; }
  }
</style>
</head>
<body>

<header>
  <div class="tag">Anglais · Grammaire</div>
  <h1><span>Régulier</span> ou <span>Irrégulier</span> ?</h1>
  <p class="subtitle">Identifie la nature du verbe au passé — 10 questions, 1 score</p>
</header>

<div class="card" id="mainCard">
  <!-- QUIZ -->
  <div id="quizView">
    <div class="progress-label">
      <span id="progressText">Question 1 / 10</span>
      <span id="scoreText">Score : 0</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar" style="width:10%"></div>
    </div>

    <div class="question-num" id="questionNum">QUESTION 1</div>

    <div class="verb-display" id="verbDisplay">—</div>
    <div class="verb-sub" id="verbSub">Quel type de verbe est-ce ?</div>

    <div class="choices">
      <button class="btn-choice" id="btnReg" onclick="submit('regular')">
        <span class="choice-icon">✅</span>
        <span class="choice-label">Régulier</span>
        <span class="choice-hint">base + -ed / -d / -ied</span>
      </button>
      <button class="btn-choice" id="btnIrreg" onclick="submit('irregular')">
        <span class="choice-icon">⚡</span>
        <span class="choice-label">Irrégulier</span>
        <span class="choice-hint">forme spéciale</span>
      </button>
    </div>

    <div class="feedback" id="feedback">
      <div class="fb-title" id="fbTitle"></div>
      <div class="explanation" id="fbExplanation"></div>
    </div>

    <button class="btn-next" id="btnNext" onclick="nextQuestion()">Question suivante →</button>
  </div>

  <!-- SCORE -->
  <div id="scoreView" style="display:none">
    <div class="score-screen">
      <div class="score-emoji" id="scoreEmoji">🏆</div>
      <div class="score-big" id="scoreBig">—</div>
      <div class="score-label">/ 10 points</div>
      <div class="score-msg" id="scoreMsg"></div>
      <div class="score-detail" id="scoreDetail"></div>
      <div class="review-list" id="reviewList"></div>
      <button class="btn-restart" onclick="startQuiz()">🔁 Recommencer</button>
    </div>
  </div>
</div>

<script>
// ─── VERBE BANK ──────────────────────────────────────────
// type: 'regular' ou 'irregular'
// pastForm: la forme affichée
// base: infinitif
// explanation: explication pédagogique
const allVerbs = [
  // ── RÉGULIERS ──
  { pastForm: "started",    base: "start",    type: "regular" },
  { pastForm: "played",     base: "play",     type: "regular" },
  { pastForm: "watched",    base: "watch",    type: "regular" },
  { pastForm: "recorded",   base: "record",   type: "regular" },
  { pastForm: "joined",     base: "join",     type: "regular" },
  { pastForm: "travelled",  base: "travel",   type: "regular" },
  { pastForm: "settled",    base: "settle",   type: "regular" },
  { pastForm: "divorced",   base: "divorce",  type: "regular" },
  { pastForm: "died",       base: "die",      type: "regular" },
  { pastForm: "married",    base: "marry",    type: "regular" },
  { pastForm: "lived",      base: "live",     type: "regular" },
  { pastForm: "stopped",    base: "stop",     type: "regular" },
  { pastForm: "moved",      base: "move",     type: "regular" },
  { pastForm: "asked",      base: "ask",      type: "regular" },
  { pastForm: "loved",      base: "love",     type: "regular" },
  { pastForm: "opened",     base: "open",     type: "regular" },
  { pastForm: "tried",      base: "try",      type: "regular" },
  { pastForm: "called",     base: "call",     type: "regular" },
  { pastForm: "wanted",     base: "want",     type: "regular" },
  { pastForm: "walked",     base: "walk",     type: "regular" },

  // ── IRRÉGULIERS ──
  { pastForm: "went",       base: "go",       type: "irregular" },
  { pastForm: "came",       base: "come",     type: "irregular" },
  { pastForm: "saw",        base: "see",      type: "irregular" },
  { pastForm: "took",       base: "take",     type: "irregular" },
  { pastForm: "left",       base: "leave",    type: "irregular" },
  { pastForm: "said",       base: "say",      type: "irregular" },
  { pastForm: "knew",       base: "know",     type: "irregular" },
  { pastForm: "got",        base: "get",      type: "irregular" },
  { pastForm: "made",       base: "make",     type: "irregular" },
  { pastForm: "thought",    base: "think",    type: "irregular" },
  { pastForm: "found",      base: "find",     type: "irregular" },
  { pastForm: "gave",       base: "give",     type: "irregular" },
  { pastForm: "told",       base: "tell",     type: "irregular" },
  { pastForm: "heard",      base: "hear",     type: "irregular" },
  { pastForm: "wrote",      base: "write",    type: "irregular" },
  { pastForm: "ran",        base: "run",      type: "irregular" },
  { pastForm: "began",      base: "begin",    type: "irregular" },
  { pastForm: "fell",       base: "fall",     type: "irregular" },
  { pastForm: "kept",       base: "keep",     type: "irregular" },
  { pastForm: "met",        base: "meet",     type: "irregular" },
];

// ─── STATE ──────────────────────────────────────────────
let questions = [];
let current = 0;
let score = 0;
let history = [];
let answered = false;
const TOTAL = 10;

// ─── HELPERS ────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ─── INIT ────────────────────────────────────────────────
function startQuiz() {
  questions = shuffle(allVerbs).slice(0, TOTAL);
  current = 0; score = 0; history = []; answered = false;
  document.getElementById('quizView').style.display = 'block';
  document.getElementById('scoreView').style.display = 'none';
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[current];
  const n = current + 1;

  document.getElementById('questionNum').textContent = `QUESTION ${n}`;
  document.getElementById('verbDisplay').textContent = q.pastForm;
  document.getElementById('verbSub').textContent = 'Ce verbe au passé est-il régulier ou irrégulier ?';
  document.getElementById('progressText').textContent = `Question ${n} / ${TOTAL}`;
  document.getElementById('scoreText').textContent = `Score : ${score}`;
  document.getElementById('progressBar').style.width = `${(n / TOTAL) * 100}%`;

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';

  document.getElementById('btnNext').style.display = 'none';

  const btnReg = document.getElementById('btnReg');
  const btnIrreg = document.getElementById('btnIrreg');
  btnReg.className = 'btn-choice';
  btnIrreg.className = 'btn-choice';
  btnReg.disabled = false;
  btnIrreg.disabled = false;
}

function submit(choice) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const ok = (choice === q.type);

  if (ok) score++;

  history.push({ q, userChoice: choice, ok });

  const btnReg = document.getElementById('btnReg');
  const btnIrreg = document.getElementById('btnIrreg');
  btnReg.disabled = true;
  btnIrreg.disabled = true;

  const chosenBtn = choice === 'regular' ? btnReg : btnIrreg;
  const correctBtn = q.type === 'regular' ? btnReg : btnIrreg;

  if (ok) {
    chosenBtn.className = 'btn-choice selected-correct';
  } else {
    chosenBtn.className = 'btn-choice selected-wrong';
    correctBtn.className = 'btn-choice reveal-correct';
  }

  const fb = document.getElementById('feedback');
  fb.className = 'feedback ' + (ok ? 'correct' : 'wrong');

  document.getElementById('fbTitle').textContent = ok
    ? '✓ Correct !'
    : `✗ Pas tout à fait… C'était ${q.type === 'regular' ? 'régulier' : 'irrégulier'}.`;

  document.getElementById('fbExplanation').innerHTML =
    `Infinitif : <strong style="color:var(--text)">${q.base}</strong>`;

  document.getElementById('btnNext').style.display = 'block';

  if (!ok) {
    document.getElementById('mainCard').classList.add('shake');
    setTimeout(() => document.getElementById('mainCard').classList.remove('shake'), 400);
  }
}

function nextQuestion() {
  current++;
  if (current >= TOTAL) {
    showScore();
  } else {
    renderQuestion();
  }
}

function showScore() {
  document.getElementById('quizView').style.display = 'none';
  document.getElementById('scoreView').style.display = 'block';
  document.getElementById('progressBar').style.width = '100%';

  document.getElementById('scoreBig').textContent = `${score}`;

  let emoji, msg, detail;
  if (score === 10)     { emoji = '🏆'; msg = 'Parfait ! 10/10 !';    detail = 'Tu maîtrises la distinction régulier/irrégulier !'; }
  else if (score >= 8)  { emoji = '🌟'; msg = 'Excellent !';          detail = 'Encore quelques verbes à consolider.'; }
  else if (score >= 6)  { emoji = '👍'; msg = 'Bien joué !';          detail = 'Revois les erreurs ci-dessous et recommence.'; }
  else if (score >= 4)  { emoji = '📚'; msg = 'Courage !';            detail = 'Les verbes irréguliers s\'apprennent par cœur !'; }
  else                  { emoji = '💪'; msg = 'Continue à t\'entraîner !'; detail = 'Relis ta liste de verbes irréguliers.'; }

  document.getElementById('scoreEmoji').textContent = emoji;
  document.getElementById('scoreMsg').textContent = msg;
  document.getElementById('scoreDetail').textContent = detail;

  const reviewList = document.getElementById('reviewList');
  reviewList.innerHTML = '';
  history.forEach((h, i) => {
    const div = document.createElement('div');
    div.className = 'review-item ' + (h.ok ? 'ok' : 'ko');
    const typeLabel = h.q.type === 'regular' ? 'Régulier' : 'Irrégulier';
    const choiceLabel = h.userChoice === 'regular' ? 'Régulier' : 'Irrégulier';
    div.innerHTML = `
      <div class="review-verb">${i+1}. ${h.q.pastForm}</div>
      <div class="review-answer">${h.ok ? '✓' : '✗'} Ta réponse : ${choiceLabel}</div>
      ${!h.ok ? `<div class="review-correct">→ Correct : ${typeLabel}</div>` : ''}
      <div class="review-base">Infinitif : ${h.q.base}</div>
    `;
    reviewList.appendChild(div);
  });
}

// ─── START ──────────────────────────────────────────────
startQuiz();
</script>
</body>
</html>
